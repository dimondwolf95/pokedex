<!DOCTYPE html>
<html>
<head>
    <title>My Region Pokédex</title>
</head>
<body>
    <h1>My Custom Pokédex</h1>

    {% for mon in pokemon %}
        <div style="border:1px solid black; padding:10px; margin:10px;">
            <h2>#{{ mon.dex }} {{ mon.name }}</h2>
            <img src="{{ url_for('static', filename='images/' + mon.image) }}" width="150">
            <p>Type: {{ mon.types }}</p>
            <p>HP: {{ mon.hp }} | ATK: {{ mon.atk }} | DEF: {{ mon.def }}</p>
            <p>{{ mon.desc }}</p>
        </div>
    {% endfor %}
</body>
</html>

<div>

        <div class="pokemon-card">
            <h2>#1 Plowvr</h2>

            <img src="static/images/PLOWVR.png" width="150">

            <p><strong>Type:</strong> Grass</p>
            <p>A playful forest Pokémon.</p>
        </div>
        
</div>
